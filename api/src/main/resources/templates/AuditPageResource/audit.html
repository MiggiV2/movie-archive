{#include base}
{#title}Audit log — Movie Archive{/title}

<h1 class="my-3"><i class="bi bi-clock-history"></i> Audit log</h1>

{#if entries.isEmpty}
	<p class="text-center text-secondary-emphasis my-5">No audit entries.</p>
{#else}
<div class="table-responsive">
	<table class="table align-middle">
		<thead>
			<tr>
				<th scope="col">Date</th>
				<th scope="col">Type</th>
				<th scope="col">User</th>
				<th scope="col">Message</th>
			</tr>
		</thead>
		<tbody>
			{#for entry in entries}
			<tr>
				<td class="text-nowrap">{entry.date}</td>
				<td><span class="badge text-bg-secondary">{entry.auditLogType}</span></td>
				<td>{entry.userName}</td>
				<td>{entry.message}</td>
			</tr>
			{/for}
		</tbody>
	</table>
</div>

<nav class="d-flex justify-content-between align-items-center my-4">
	<a class="btn btn-outline-primary {#if !hasPrev}disabled{/if}" href="/ui/audit?page={prevPage}">
		<i class="bi bi-chevron-left"></i> Prev
	</a>
	<span class="text-secondary-emphasis">Page {displayPage}</span>
	<a class="btn btn-outline-primary {#if !hasNext}disabled{/if}" href="/ui/audit?page={nextPage}">
		Next <i class="bi bi-chevron-right"></i>
	</a>
</nav>
{/if}
{/include}
