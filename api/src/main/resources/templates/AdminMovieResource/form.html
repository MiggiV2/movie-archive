{#include base}
{#title}{#if isNew}Add movie{#else}Edit movie{/if} — Movie Archive{/title}

<div class="box my-4" style="text-align: left; background: var(--background-color); border: 1px solid var(--bs-border-color);">
	<h1 class="mb-4 text-center">{#if isNew}<i class="bi bi-plus-circle"></i> Add movie{#else}<i class="bi bi-pencil"></i> Edit movie{/if}</h1>

	<form {#if isNew}hx-post="/ui/admin/movies"{#else}hx-put="/ui/admin/movies/{movie.id}"{/if}>
		<div class="row g-3">
			<div class="col-12 col-md-8">
				<label class="form-label">Title *</label>
				<input class="form-control" name="title" required value="{movie.title ?: ''}">
			</div>
			<div class="col-6 col-md-4">
				<label class="form-label">Year *</label>
				<input class="form-control" name="year" type="number" required {#if movie.year}value="{movie.year}"{/if}>
			</div>
			<div class="col-12 col-md-6">
				<label class="form-label">Type *</label>
				<input class="form-control" name="type" required value="{movie.type ?: ''}">
			</div>
			<div class="col-12 col-md-6">
				<label class="form-label">Block</label>
				<input class="form-control" name="block" value="{movie.block ?: ''}">
			</div>
			<div class="col-12">
				<label class="form-label">Original name</label>
				<input class="form-control" name="originalName" value="{movie.originalName ?: ''}">
			</div>
			<div class="col-12 col-md-6">
				<label class="form-label">External ID (IMDb)</label>
				<input class="form-control" name="externalId" value="{movie.externalId ?: ''}"
					   placeholder="Leave empty to auto-detect">
			</div>
			<div class="col-12 col-md-6">
				<label class="form-label">Wiki URL</label>
				<input class="form-control" name="wikiUrl" type="url" value="{movie.wikiUrl ?: ''}">
			</div>
		</div>
		<div class="d-flex gap-2 mt-4">
			<button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Save</button>
			<a class="btn btn-outline-primary" href="/ui/movies">Cancel</a>
		</div>
	</form>
</div>
{/include}
