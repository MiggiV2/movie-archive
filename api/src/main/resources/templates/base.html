<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>{#insert title}Movie Archive{/}</title>
	<link rel="icon" href="/img/logo.png">
	<link rel="stylesheet" href="/css/bootstrap.min.css">
	<link rel="stylesheet" href="/css/bootstrap-icons.css">
	<link rel="stylesheet" href="/css/app.css">
	<script src="/js/htmx.min.js"></script>
</head>
<body>
<header class="app-header">
	<nav class="navbar navbar-expand-md py-2">
		<div class="container-fluid" style="max-width: 70rem;">
			<a class="navbar-brand d-flex align-items-center" href="/ui">
				<img src="/img/logo.png" alt="" class="logo">
				<span class="fw-semibold">Movie Archive</span>
			</a>
			<button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
					data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Menu">
				<i class="bi bi-list fs-2" style="color: var(--background-color);"></i>
			</button>
			<div class="collapse navbar-collapse" id="mainNav">
				<ul class="navbar-nav ms-auto align-items-md-center gap-md-2">
					<li class="nav-item">
						<a class="nav-link" href="/ui/movies"><i class="bi bi-collection"></i> Browse</a>
					</li>
					{#if isAdmin}
					<li class="nav-item">
						<a class="nav-link" href="/ui/admin/movies/new"><i class="bi bi-plus-circle"></i> Add</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="/ui/audit"><i class="bi bi-clock-history"></i> Audit</a>
					</li>
					{/if}
					<li class="nav-item">
						<span class="nav-link"><i class="bi bi-person-circle"></i> {username}</span>
					</li>
					<li class="nav-item">
						<a class="nav-link logout" href="/ui/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>
</header>

<main>
	{#insert /}
</main>

<!-- Container for htmx-loaded movie detail overlay -->
<div id="modal-root"></div>

<footer class="app-footer">
	Movie Archive &middot; built with Quarkus Qute
</footer>

<script src="/js/bootstrap.bundle.min.js"></script>
</body>
</html>
