############
# Postgres #
############
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=quarkus
quarkus.datasource.password=postgres
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
%dev.quarkus.flyway.locations=db/migration,filesystem:src/main/resources/dev-db/migration
%test.quarkus.flyway.locations=db/migration,filesystem:src/main/resources/dev-db/migration
#quarkus.flyway.baseline-version=1.0.0
#quarkus.flyway.baseline-on-migrate=true
######################
# OIDC Configuration #
######################
quarkus.oidc.client-id=movies-spa
quarkus.oidc.credentials.secret=dummy
quarkus.oidc.auth-server-url=https://sso.mymiggi.de/oauth2/openid/movies-spa
quarkus.oidc.roles.source=userinfo
%prod.quarkus.oidc.client-id=${CLIENT_ID}
%prod.quarkus.oidc.credentials.secret=${CLIENT_SECRET}
# Hybrid: bearer-token auth for the SPA/JSON API, authorization-code flow for the Qute UI
quarkus.oidc.application-type=hybrid
quarkus.oidc.authentication.user-info-required=true
quarkus.oidc.authentication.scopes=profile,email
quarkus.oidc.authentication.redirect-path=/ui/login/callback
quarkus.oidc.authentication.restore-path-after-redirect=true
quarkus.oidc.authentication.cookie-path=/ui
# Prod: IdP enforces PKCE and Quarkus runs behind a TLS-terminating reverse proxy
%prod.quarkus.oidc.authentication.pkce-required=true
%prod.quarkus.oidc.authentication.force-redirect-https-scheme=true
%prod.quarkus.http.proxy.proxy-address-forwarding=true
%prod.quarkus.http.proxy.enable-forwarded-host=true
%prod.quarkus.http.proxy.enable-forwarded-proto=true
###############
# Permissions #
###############
# API endpoints keep their explicit /api/v2 prefix; UI static assets are served at the root.
quarkus.http.auth.permission.public.paths=/,/api/v2/service/config,/api/v2/export/session/*,\
  /api/v2/movie/count,/css/*,/js/*,/img/*,/fonts/*,/favicon.ico
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.user_v2.paths=*
quarkus.http.auth.permission.user_v2.policy=authenticated
quarkus.http.auth.permission.user_v2.methods=GET,HEAD,OPTIONS
quarkus.http.auth.permission.admin_v2.paths=*
quarkus.http.auth.permission.admin_v2.policy=admin-policy
quarkus.http.auth.permission.admin_v2.methods=POST,PUT,DELETE,PATCH
#
quarkus.http.auth.policy.admin-policy.roles-allowed=${DE_MYMIGGI_ADMIN_ROLE:movie_admins@sso.mymiggi.de}
# Token management is available to any authenticated user (not admin-only). These
# concrete paths are more specific than the admin_v2 `*` rule, so "longest path wins"
# lets a non-admin create/revoke their own tokens via POST/DELETE.
quarkus.http.auth.permission.tokens.paths=/api/v2/token,/api/v2/token/*,/ui/tokens,/ui/tokens/*
quarkus.http.auth.permission.tokens.policy=authenticated
%dev.quarkus.http.auth.permission.user_v2.policy=permit
%dev.quarkus.http.auth.permission.admin_v2.policy=permit
%dev.quarkus.http.auth.permission.tokens.policy=permit
#############
# My config #
#############
# Admin role string, globally resolvable so @RolesAllowed("${de.mymiggi.admin-role}")
# (MCP write tools) and TokenRoleMapper share one source with the admin-policy below.
de.mymiggi.admin-role=${DE_MYMIGGI_ADMIN_ROLE:movie_admins@sso.mymiggi.de}
de.mymiggi.user-role=movie_group@sso.mymiggi.de
de.mymiggi.movie.default-page.size=30
%test.de.mymiggi.movie.default-page.size=6
de.mymiggi.movie.owner=Dev
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=https://localhost:1024
quarkus.smallrye-openapi.path=/api/v2/openapi
quarkus.banner.path=banner.txt
#######
# MCP #
#######
# MCP server served at /mcp (Streamable HTTP). Tools authenticate with the same API-token
# Bearer mechanism; write tools are gated on the admin role at the tool level.
quarkus.mcp.server.server-info.name=movie-archive-mcp
# Lock the transport path to authenticated (more specific than the admin_v2 `*` rule, so
# "longest path wins"). All MCP tool calls arrive as POST /mcp regardless of tool, so this is
# intentionally `authenticated` (not admin-policy) — write-tool admin enforcement is done per
# tool via @RolesAllowed in MovieTools, not at the HTTP layer.
quarkus.http.auth.permission.mcp-endpoints.paths=/mcp,/mcp/*
quarkus.http.auth.permission.mcp-endpoints.policy=authenticated
%dev.quarkus.http.auth.permission.mcp-endpoints.policy=permit
quarkus.cache.caffeine.expire-after-write=5m
# Root path is the server root; the API carries its own /api/v2 prefix in each resource @Path,
# so the JSON API stays at /api/v2/* while the Qute UI lives at the top-level /ui.
quarkus.http.root-path=/
##############
# Deployment #
##############
quarkus.container-image.name=movie-api
quarkus.container-image.group=miggi
quarkus.container-image.registry=code.mymiggi.de
quarkus.container-image.push=true
%prod.quarkus.management.enabled=true
%dev.quarkus.http.host=0.0.0.0
##########
# Native #
##########
# TokenSecrets holds a static SecureRandom; initialize it at runtime so its seed is not
# baked into the native image heap (native-image rejects Random instances in the heap).
quarkus.native.additional-build-args=--initialize-at-run-time=de.mymiggi.movie.api.auth.TokenSecrets
