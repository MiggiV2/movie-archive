{#include base}
{#title}Movie Archive{/title}

<div class="box my-4">
	<img src="/img/logo.svg" alt="" style="height: 84px;" class="mb-3">
	<h1 class="mb-2 fw-bold"><span class="text-gradient">Movie Archive</span></h1>
	<p class="mb-1 fs-5">A collection curated by <strong>{owner}</strong>.</p>
	<p class="display-5 fw-bold rating-badge mb-3">{movieCount}</p>
	<p class="text-secondary-emphasis mb-4">movies in the archive</p>
	<a class="btn btn-primary btn-lg" href="/ui/movies">
		<i class="bi bi-collection"></i> Browse the collection
	</a>
</div>
{/include}
