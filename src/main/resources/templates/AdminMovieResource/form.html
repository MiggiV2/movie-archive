{#include base}
{#title}{#if isNew}Add movie{#else}Edit movie{/if} — Movie Archive{/title}

<nav style="margin:.4rem 0 1.1rem;font-size:.92rem"><a class="muted" href="/ui/movies">‹ Back to Browse</a></nav>

<div style="display:flex;align-items:flex-end;gap:.9rem;flex-wrap:wrap;margin-bottom:1.4rem">
	<div>
		<p class="eyebrow" style="margin:0 0 .35rem">{#if isNew}New entry{#else}Edit entry{/if}</p>
		<h1 style="font-size:2.1rem">{#if isNew}Add a Movie{#else}Edit Movie{/if}</h1>
	</div>
	<span class="chip" style="margin-bottom:.35rem">Admin only</span>
</div>

<div class="card" style="padding:1.7rem 1.7rem 1.9rem;max-width:60rem">
	<form {#if isNew}hx-post="/ui/admin/movies"{#else}hx-put="/ui/admin/movies/{movie.id}"{/if}>
		<div class="form-grid">
			<div class="field col-8">
				<label class="label" for="f-title">Title <span class="req">*</span></label>
				<input class="input" id="f-title" name="title" required value="{movie.title ?: ''}" placeholder="e.g. Blade Runner 2049">
			</div>
			<div class="field col-4">
				<label class="label" for="f-year">Year <span class="req">*</span></label>
				<input class="input tnum" id="f-year" name="year" type="number" inputmode="numeric" min="1888" max="2099" required {#if movie.year}value="{movie.year}"{/if} placeholder="2017">
			</div>

			<div class="field col-6">
				<label class="label" for="f-type">Type <span class="req">*</span></label>
				<input class="input" id="f-type" name="type" required value="{movie.type ?: ''}" placeholder="Blu-ray · DVD · 4K UHD">
			</div>
			<div class="field col-6">
				<label class="label" for="f-block">Shelf / Block</label>
				<input class="input" id="f-block" name="block" value="{movie.block ?: ''}" placeholder="e.g. Block A1 · 5">
			</div>

			<div class="field col-12">
				<label class="label" for="f-original">Original name</label>
				<input class="input" id="f-original" name="originalName" value="{movie.originalName ?: ''}" placeholder="Original-language title (optional)">
			</div>

			<div class="field col-6">
				<label class="label" for="f-ext">External ID <span class="muted" style="font-weight:500">(IMDb)</span></label>
				<input class="input" id="f-ext" name="externalId" value="{movie.externalId ?: ''}" placeholder="tt0000000">
				<span class="hint">Leave empty to auto-detect from title &amp; year.</span>
			</div>
			<div class="field col-6">
				<label class="label" for="f-wiki">Wikipedia URL</label>
				<input class="input" id="f-wiki" name="wikiUrl" type="url" value="{movie.wikiUrl ?: ''}" placeholder="https://en.wikipedia.org/wiki/…">
			</div>
		</div>

		<hr style="margin:1.6rem 0 1.3rem">
		<div style="display:flex;gap:.7rem;flex-wrap:wrap;align-items:center">
			<button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-check-lg"></i> {#if isNew}Add to archive{#else}Save changes{/if}</button>
			<a class="btn btn-ghost btn-lg" href="/ui/movies">Cancel</a>
			<span class="hint" style="margin-left:auto"><span class="req" style="color:var(--cognac);font-weight:700">*</span> Required field</span>
		</div>
	</form>
</div>
{/include}
