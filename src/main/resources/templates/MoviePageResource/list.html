{#include base}
{#title}Browse — Movie Archive{/title}

<div style="display:flex;flex-wrap:wrap;gap:1rem;align-items:center;justify-content:space-between;margin:.5rem 0 1.2rem">
	<label class="input-wrap" style="flex:1 1 22rem">
		<span class="ic"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>
		<input type="search" name="query" class="input" placeholder="Search by title…" autocomplete="off"
			   hx-get="/ui/movies/search"
			   hx-trigger="keyup changed delay:300ms, search"
			   hx-target="#results"
			   hx-indicator="#search-spinner">
	</label>
	<div style="display:flex;gap:.5rem;align-items:center">
		<span id="search-spinner" class="htmx-indicator spinner"></span>
		<div class="segmented">
			<a class="btn {#if sort == 'name'}btn-primary{#else}btn-ghost{/if}" href="/ui/movies?sort=name&desc={desc}">Name</a>
			<a class="btn {#if sort == 'year'}btn-primary{#else}btn-ghost{/if}" href="/ui/movies?sort=year&desc={desc}">Year</a>
		</div>
		<a class="btn btn-ghost btn-sm" href="/ui/movies?sort={sort}&desc={toggleDesc}" title="Toggle direction" aria-label="Toggle sort direction">
			<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">{#if desc}<path d="m6 9 6 6 6-6"/>{#else}<path d="m18 15-6-6-6 6"/>{/if}</svg>
		</a>
	</div>
</div>

<div id="results">
	{#fragment id=cards}
	{#if movies.isEmpty}
		<p class="muted" style="text-align:center;margin:3rem 0">No movies found.</p>
	{#else}
		<div class="movie-grid">
			{#for movie in movies}
			<article class="movie-card"
					 hx-get="/ui/movies/{movie.id}"
					 hx-target="#modal-root"
					 hx-swap="innerHTML">
				<img class="poster" src="{movie.posterThumb}" alt="{movie.title}" loading="lazy">
				<div class="meta">
					<p class="title">{movie.title}</p>
					<span class="year">{movie.year}</span>
				</div>
			</article>
			{/for}
		</div>
	{/if}
	{/fragment}

	{#if !movies.isEmpty}
	<nav style="display:flex;justify-content:space-between;align-items:center;margin:2rem 0">
		<a class="btn btn-ghost {#if page <= 0}disabled{/if}" href="/ui/movies?page={prevPage}&sort={sort}&desc={desc}">‹ Prev</a>
		<span class="muted tnum">Page {displayPage}</span>
		<a class="btn btn-ghost {#if !hasNext}disabled{/if}" href="/ui/movies?page={nextPage}&sort={sort}&desc={desc}">Next ›</a>
	</nav>
	{/if}
</div>
{/include}
