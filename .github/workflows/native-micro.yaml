name: Build Quarkus Native Micro Image

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/native-micro.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compute image tag from pom version
        id: tag
        working-directory: api
        run: |
          VERSION=$(./mvnw -B -q help:evaluate -Dexpression=project.version -DforceStdout)
          TAG="snapshot-${VERSION%-SNAPSHOT}"
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Login to Forgejo Registry
        uses: docker/login-action@v3
        with:
          registry: code.mymiggi.de
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build native image and push (via Quarkus + jib)
        working-directory: api
        run: >-
          ./mvnw -B package -Pnative -DskipTests
          -Dquarkus.native.container-build=true
          -Dquarkus.container-image.tag=${{ steps.tag.outputs.value }}
          -Dquarkus.container-image.additional-tags=latest
          -Dquarkus.jib.base-native-image=quay.io/quarkus/quarkus-micro-image:2.0
