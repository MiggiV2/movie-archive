name: Build Quarkus Native Micro Image

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/native-micro.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build native executable (container build via Mandrel)
        working-directory: api
        run: ./mvnw -B package -Pnative -DskipTests -Dquarkus.native.container-build=true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Forgejo Registry
        uses: docker/login-action@v3
        with:
          registry: code.mymiggi.de
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push native-micro image
        uses: docker/build-push-action@v6
        with:
          context: api
          file: api/src/main/docker/Dockerfile.native-micro
          push: true
          tags: |
            code.mymiggi.de/miggi/movie-api-native-micro:dev-${{ github.run_number }}
            code.mymiggi.de/miggi/movie-api-native-micro:latest
